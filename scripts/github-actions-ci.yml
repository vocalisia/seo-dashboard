# Copy to .github/workflows/ci.yml when your token has the `workflow` scope.
# Pipeline volontairement sans ESLint tant que le dépôt a des erreurs legacy ;
# en local : npm run ci (vert) | npm run ci:full (lint + tout).

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Next.js build
        run: npm run build
